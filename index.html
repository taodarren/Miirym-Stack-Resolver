<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MIIRYM STACK SIMULATOR</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>MIIRYM STACK SIMULATOR</h1>

<div id="controls">
  <!-- Miirym input/button -->
  <div class="control-row">
    <label>MIIRYM COUNT:</label>
    <input type="number" id="miirymInput" value="4" min="0">
    <button class="cast miirym-btn" onclick="spawnMiiryms()">ENTER MIIRYM</button>
  </div>

  <!-- Dragon input/button -->
  <div class="control-row">
    <label>DRAGON TOKEN COUNT:</label>
    <input type="number" id="dragonInput" value="0" min="0">
    <button class="cast dragon-btn" onclick="spawnDragons()">ENTER DRAGON TOKEN</button>
  </div>
    <!-- Dragon input/button -->
  <div class="control-row">
    <label>ROAMING THRONE COUNT:</label>
    <input type="number" id="throneInput" value="0" min="0">
    <button class="cast throne-btn" onclick="spawnThrones()">ENTER ROMAING THRONE</button>
  </div>
</div>


<div class="engine-buttons">
  <button id="castScourgeButton" class="cast scourge-btn" onclick="castScourge()">
    CAST SCOURGE OF VALKAS
  </button>

  <button id="castTerrorButton" class="cast terror-btn" onclick="castTerror()">
    CAST TERROR OF THE PEAKS
  </button>
</div>

<div id="resolveButtons">
  <button class="resolve" onclick="resolveOne()">RESOLVE ONE</button>
  <button class="resolve" onclick="resolveAll()">RESOLVE ALL</button>
  <button class="resolve" onclick="showResult()">SHOW RESULT</button>
</div>

<div class="damage" id="damageDisplay">TOTAL DAMAGE DEALT: 0 </div>
<div class="damage" id="topAbilityDamage">CURRENT ABILITY DAMAGE: 0 </div>


<div class="container">
  <div class="panel">
    <h3>BATTLEFIELD</h3>
    <div id="battlefield"></div>
  </div>

  <div class="panel">
    <h3>STACK</h3>
    <div id="stack"></div>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
