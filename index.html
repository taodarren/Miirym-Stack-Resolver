<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scourge of Valkas Simulator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>MIIRYM STACK SIMULATOR</h1>

<div id="controls">
  <label>MIIRYMS TO ENTER BATTLEFIELD:</label>
  <input type="number" id="miirymInput" value="4" min="0">
  <button class="cast miirym-btn" onclick="etbMiiryms()">ENTER MIIRYM</button>
</div>
  <br><br>

  <div class="engine-buttons">
    <button id="castScourgeButton" class="cast scourge-btn" onclick="castScourge()">
      CAST SCOURGE OF VALKAS
    </button>

    <button id="castTerrorButton" class="cast terror-btn" onclick="castTerror()">
      CAST TERROR OF THE PEAKS
    </button>
  </div>

  <div id="resolveButtons">
    <button class="resolve" onclick="resolveOne()">Resolve One</button>
    <button class="resolve" onclick="resolveAll()">Resolve All</button>
    <button class="resolve" onclick="showResult()">Show Result</button>
  </div>

  <h2 class="damage" id="damageDisplay">Total Damage: 0</h2>


<div class="container">
  <div class="panel">
    <h3>Battlefield</h3>
    <div id="battlefield"></div>
  </div>

  <div class="panel">
    <h3>Stack</h3>
    <div id="stack"></div>
  </div>
</div>

<audio id="roarSound" src="etb.mp3" preload="auto"></audio>

<script src="main.js"></script>
</body>
</html>
